<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GarantiApp">
<title>GarantiApp</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --green-50: #E1F5EE;
    --green-100: #9FE1CB;
    --green-200: #5DCAA5;
    --green-400: #1D9E75;
    --green-600: #0F6E56;
    --green-800: #085041;
    --green-900: #04342C;
    --amber-50: #FAEEDA;
    --amber-200: #FAC775;
    --amber-400: #EF9F27;
    --amber-600: #BA7517;
    --amber-800: #633806;
    --red-50: #FCEBEB;
    --red-200: #F09595;
    --red-400: #E24B4A;
    --red-600: #A32D2D;
    --red-800: #501313;
    --gray-50: #F1EFE8;
    --gray-100: #D3D1C7;
    --gray-200: #B4B2A9;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #444441;
    --gray-900: #2C2C2A;
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --text: #2C2C2A;
    --text-muted: #5F5E5A;
    --border: rgba(44,44,42,0.1);
    --radius: 16px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1A18;
      --card: #252523;
      --text: #F1EFE8;
      --text-muted: #888780;
      --border: rgba(241,239,232,0.1);
      --green-50: #04342C;
      --green-100: #085041;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior: none;
  }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }
  .screen { display: none; flex: 1; overflow-y: auto; padding: 0 0 80px; }
  .screen.active { display: flex; flex-direction: column; }

  /* Header */
  .header {
    padding: 52px 20px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { font-size: 22px; font-weight: 600; color: var(--text); }
  .header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* Bottom Nav */
  .bottom-nav {
    display: flex;
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 0; cursor: pointer; border: none; background: none;
    color: var(--text-muted); font-size: 11px; font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
  }
  .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .nav-item.active { color: var(--green-400); }

  /* Dashboard */
  .summary-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; padding: 16px 16px 8px;
  }
  .stat-card {
    background: var(--card); border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    padding: 12px 10px; text-align: center;
  }
  .stat-card .num { font-size: 24px; font-weight: 600; }
  .stat-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .stat-card.ok .num { color: var(--green-400); }
  .stat-card.warn .num { color: var(--amber-400); }
  .stat-card.exp .num { color: var(--red-400); }

  /* Product Cards */
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 14px 16px 6px;
  }
  .product-card {
    margin: 0 16px 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.1s;
    active-scale: 0.98;
  }
  .product-card:active { transform: scale(0.98); }
  .card-top {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 14px 10px;
  }
  .product-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0; overflow: hidden;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-info h3 { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-info .brand { font-size: 12px; color: var(--text-muted); }
  .status-pill {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .status-ok { background: var(--green-50); color: var(--green-800); }
  .status-warn { background: var(--amber-50); color: var(--amber-800); }
  .status-exp { background: var(--red-50); color: var(--red-800); }

  /* Progress bar */
  .progress-area { padding: 0 14px 14px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .fill-ok { background: var(--green-400); }
  .fill-warn { background: var(--amber-400); }
  .fill-exp { background: var(--red-400); }

  /* Countdown chip */
  .countdown-chip {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--text-muted);
    padding: 0 14px 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .countdown-chip svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: calc(72px + env(safe-area-inset-bottom));
    right: calc(50% - 220px + 16px);
    max-right: 16px;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--green-400);
    color: white; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(29,158,117,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 50;
  }
  .fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(29,158,117,0.25); }
  .fab svg { width: 26px; height: 26px; stroke: white; fill: none; stroke-width: 2.2; }

  /* Modal / Sheet */
  .sheet-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    background: var(--card); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px;
    padding: 0 0 calc(20px + env(safe-area-inset-bottom));
    max-height: 92dvh; overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--gray-200);
    border-radius: 99px; margin: 12px auto 0;
  }
  .sheet-title {
    font-size: 17px; font-weight: 600;
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .btn-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--gray-50); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .btn-close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  /* Form */
  .form-group { padding: 0 20px 16px; }
  .form-group label { font-size: 12px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color 0.15s;
    -webkit-appearance: none; appearance: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--green-400); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Emoji picker */
  .emoji-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 20px 16px;
  }
  .emoji-btn {
    width: 44px; height: 44px; border-radius: 12px;
    font-size: 22px; border: 1.5px solid var(--border);
    background: var(--bg); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.1s, background 0.1s;
  }
  .emoji-btn.selected { border-color: var(--green-400); background: var(--green-50); }

  /* Save btn */
  .btn-save {
    margin: 4px 20px 0; width: calc(100% - 40px);
    padding: 15px; border-radius: var(--radius-sm);
    background: var(--green-400); color: white; border: none;
    font-size: 16px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .btn-save:active { transform: scale(0.98); background: var(--green-600); }
  .btn-delete {
    margin: 10px 20px 0; width: calc(100% - 40px);
    padding: 14px; border-radius: var(--radius-sm);
    background: none; color: var(--red-400);
    border: 1.5px solid var(--red-200);
    font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }

  /* Detail sheet */
  .detail-hero {
    padding: 20px; text-align: center;
  }
  .detail-icon {
    width: 72px; height: 72px; border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin: 0 auto 12px; overflow: hidden;
  }
  .detail-name { font-size: 20px; font-weight: 600; }
  .detail-brand { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
  .detail-countdown {
    font-family: 'DM Mono', monospace;
    font-size: 32px; font-weight: 500;
    margin: 8px 0 4px;
  }
  .detail-sub { font-size: 13px; color: var(--text-muted); }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 20px 16px;
  }
  .detail-stat {
    background: var(--bg); border-radius: var(--radius-sm);
    padding: 12px; text-align: center;
  }
  .detail-stat .val { font-size: 15px; font-weight: 600; }
  .detail-stat .key { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Empty state */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 30px; text-align: center; gap: 12px;
  }
  .empty-icon { font-size: 52px; opacity: 0.5; }
  .empty-state h2 { font-size: 18px; font-weight: 500; }
  .empty-state p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  /* Notification banner */
  .notif-banner {
    display: none; align-items: center; gap: 10px;
    margin: 12px 16px 0;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--amber-50); border: 1px solid var(--amber-200);
    font-size: 13px; color: var(--amber-800);
  }
  .notif-banner.show { display: flex; }
  .notif-banner svg { width: 18px; height: 18px; stroke: var(--amber-600); fill: none; stroke-width: 2; flex-shrink: 0; }

  /* Scrollable content area */
  .scroll-content { flex: 1; }

  /* Backup export/import */
  .backup-row { display: flex; gap: 8px; margin-top: 12px; }
  .backup-link {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 20px;
    padding: 7px 12px; cursor: pointer;
    font-size: 12px; font-weight: 600; color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }
  .backup-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* Photo picker */
  .photo-picker { display: flex; align-items: center; gap: 14px; }
  .photo-preview {
    width: 64px; height: 64px; border-radius: 14px; overflow: hidden; flex-shrink: 0;
    background: var(--bg); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 26px;
  }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-actions { display: flex; flex-direction: column; gap: 6px; }
  .photo-btn {
    padding: 8px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 13px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .photo-btn-remove { color: var(--red-400); border-color: var(--red-200); }
</style>
</head>
<body>
<div id="app">

  <!-- SCREEN: Dashboard -->
  <div class="screen active" id="screen-dash">
    <div class="header">
      <h1>GarantiApp</h1>
      <p id="header-date"></p>
    </div>
    <div class="scroll-content">
      <div id="notif-banner" class="notif-banner">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="notif-text"></span>
      </div>
      <div class="summary-row">
        <div class="stat-card ok">
          <div class="num" id="count-ok">0</div>
          <div class="lbl">Na garantia</div>
        </div>
        <div class="stat-card warn">
          <div class="num" id="count-warn">0</div>
          <div class="lbl">Vencendo</div>
        </div>
        <div class="stat-card exp">
          <div class="num" id="count-exp">0</div>
          <div class="lbl">Vencidos</div>
        </div>
      </div>
      <div id="cards-container"></div>
    </div>
  </div>

  <!-- SCREEN: Lista completa -->
  <div class="screen" id="screen-list">
    <div class="header">
      <h1>Todos os produtos</h1>
      <p id="list-count"></p>
      <div class="backup-row">
        <button class="backup-link" onclick="exportBackup()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar backup
        </button>
        <button class="backup-link" onclick="document.getElementById('import-file').click()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importar backup
        </button>
        <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importBackup(event)">
      </div>
    </div>
    <div id="list-container" class="scroll-content"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-dash" onclick="switchTab('dash')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <button class="nav-item" id="nav-list" onclick="switchTab('list')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Lista
    </button>
  </nav>

  <!-- FAB -->
  <button class="fab" onclick="openAddSheet()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- Sheet: Adicionar/Editar produto -->
<div class="sheet-overlay" id="sheet-add">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="sheet-add-title">Novo produto</span>
      <button class="btn-close" onclick="closeAddSheet()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label>Foto do produto (opcional)</label>
      <div class="photo-picker">
        <div class="photo-preview" id="photo-preview">
          <span id="photo-preview-empty">📷</span>
          <img id="photo-preview-img" style="display:none" alt="">
        </div>
        <div class="photo-actions">
          <button type="button" class="photo-btn" onclick="document.getElementById('input-photo').click()">Escolher foto</button>
          <button type="button" class="photo-btn photo-btn-remove" id="btn-remove-photo" onclick="removePhoto()" style="display:none">Remover foto</button>
        </div>
        <input type="file" id="input-photo" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">
      </div>
    </div>

    <div class="form-group">
      <label>Ícone</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <div class="form-group">
      <label>Nome do produto</label>
      <input type="text" id="input-name" placeholder="ex: Notebook Dell XPS 15" />
    </div>
    <div class="form-group">
      <label>Marca / Modelo</label>
      <input type="text" id="input-brand" placeholder="ex: Dell, modelo 2023" />
    </div>
    <div class="form-group">
      <label>Local de compra (opcional)</label>
      <input type="text" id="input-store" placeholder="ex: Magazine Luiza, Fast Shop..." />
    </div>

    <div class="form-row" style="padding: 0 20px 16px;">
      <div>
        <label style="font-size:12px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em">Data de compra</label>
        <input type="date" id="input-purchase" />
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em">Garantia (meses)</label>
        <input type="number" id="input-months" placeholder="12" min="1" max="120" />
      </div>
    </div>

    <div class="form-group">
      <label>Nº da nota fiscal / série (opcional)</label>
      <input type="text" id="input-nf" placeholder="ex: NF-000123" />
    </div>

    <button class="btn-save" onclick="saveProduct()">Salvar produto</button>
    <button class="btn-delete" id="btn-delete" onclick="deleteProduct()" style="display:none">Excluir produto</button>
    <div style="height:8px"></div>
  </div>
</div>

<!-- Sheet: Detalhe do produto -->
<div class="sheet-overlay" id="sheet-detail">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="detail-hero">
      <div class="detail-icon" id="detail-icon"></div>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-brand" id="detail-brand"></div>
      <div class="detail-countdown" id="detail-countdown"></div>
      <div class="detail-sub" id="detail-sub"></div>
    </div>
    <div class="detail-grid" id="detail-grid"></div>
    <button class="btn-save" onclick="editFromDetail()" style="background:var(--bg);color:var(--text);border:1.5px solid var(--border);">
      Editar produto
    </button>
    <div style="height:8px"></div>
  </div>
</div>

<script>
const EMOJIS = ['📱','💻','📺','🖥️','⌨️','🖱️','📷','🎮','🎧','🔊','📠','🖨️','📟','🔋','💡','🏠','❄️','🧺','🍳','☕','🧹','🔧','🔩','🚗','🛵','⌚','💊','🏃','🎸','📚'];

const SUPABASE_URL = 'https://tzaxrjouougseinrxvmu.supabase.co';

// Photo picker (comprime a imagem via canvas; o upload real acontece so ao salvar o produto)
function handlePhotoSelect(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const MAX = 900;
      let { width, height } = img;
      if (width > height && width > MAX) { height = Math.round(height * MAX / width); width = MAX; }
      else if (height > MAX) { width = Math.round(width * MAX / height); height = MAX; }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        currentPhotoBlob = blob;
        currentPhotoAction = 'new';
        setPhotoPreview(URL.createObjectURL(blob));
      }, 'image/jpeg', 0.72);
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function setPhotoPreview(url) {
  const img = document.getElementById('photo-preview-img');
  const empty = document.getElementById('photo-preview-empty');
  const removeBtn = document.getElementById('btn-remove-photo');
  if (url) {
    img.src = url;
    img.style.display = 'block';
    empty.style.display = 'none';
    removeBtn.style.display = 'block';
  } else {
    img.style.display = 'none';
    empty.style.display = 'block';
    removeBtn.style.display = 'none';
  }
}

function removePhoto() {
  currentPhotoBlob = null;
  currentPhotoAction = 'removed';
  setPhotoPreview(null);
}

// Storage: upload/remocao de fotos no bucket privado (uma pasta por usuario)
async function uploadPhoto(blob, id) {
  const path = `${userId}/${id}.jpg`;
  const { error } = await supabase.storage.from(PHOTO_BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
  if (error) { alert('Não foi possível enviar a foto: ' + error.message); return null; }
  return path;
}

async function deletePhotoFile(path) {
  if (!path) return;
  await supabase.storage.from(PHOTO_BUCKET).remove([path]);
}

function dataUrlToBlob(dataUrl) {
  return fetch(dataUrl).then(r => r.blob());
}

function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// Dates & countdown
function nowTs() { return Math.floor(Date.now() / 1000); }
function tsToDate(ts) { return new Date(ts * 1000); }
// Interpreta "YYYY-MM-DD" como data local (evita o input de 1 dia por causa do parse em UTC)
function dateToTs(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return Math.floor(new Date(y, m - 1, d).getTime() / 1000);
}
// Formata um timestamp como "YYYY-MM-DD" em horário local, para preencher <input type="date">
function tsToDateInputValue(ts) {
  const d = tsToDate(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function calcExpiry(purchaseTs, months) {
  const d = new Date(purchaseTs * 1000);
  d.setMonth(d.getMonth() + months);
  return Math.floor(d.getTime() / 1000);
}

function getStatus(expiryTs) {
  const now = nowTs();
  const diff = expiryTs - now;
  const days = Math.floor(diff / 86400);
  if (diff < 0) return { label: 'Vencida', cls: 'exp', days };
  if (days <= 60) return { label: 'Vencendo!', cls: 'warn', days };
  return { label: 'Na garantia', cls: 'ok', days };
}

function formatCountdown(days) {
  if (days < 0) {
    const abs = Math.abs(days);
    if (abs < 30) return `há ${abs}d`;
    const m = Math.floor(abs / 30); return `há ${m}m`;
  }
  if (days === 0) return 'Vence hoje!';
  if (days < 30) return `${days} dias`;
  if (days < 365) { const m = Math.floor(days / 30), d = days % 30; return d > 0 ? `${m}m ${d}d` : `${m} meses`; }
  const y = Math.floor(days / 365), r = days % 365, m = Math.floor(r / 30);
  return m > 0 ? `${y}a ${m}m` : `${y} ano${y > 1 ? 's' : ''}`;
}

function formatDate(ts) {
  return tsToDate(ts).toLocaleDateString('pt-BR');
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function progressPct(purchaseTs, expiryTs) {
  const now = nowTs();
  const total = expiryTs - purchaseTs;
  const elapsed = now - purchaseTs;
  return Math.min(100, Math.max(0, Math.round((elapsed / total) * 100)));
}

// Render dashboard
function renderDash() {
  const now = nowTs();
  let ok = 0, warn = 0, exp = 0;
  const sorted = [...products].sort((a, b) => a.expiryTs - b.expiryTs);

  sorted.forEach(p => {
    const s = getStatus(p.expiryTs);
    if (s.cls === 'ok') ok++;
    else if (s.cls === 'warn') warn++;
    else exp++;
  });

  document.getElementById('count-ok').textContent = ok;
  document.getElementById('count-warn').textContent = warn;
  document.getElementById('count-exp').textContent = exp;

  // Notification
  const banner = document.getElementById('notif-banner');
  const expiring = sorted.filter(p => {
    const d = getStatus(p.expiryTs);
    return d.cls === 'warn' || d.cls === 'exp';
  });
  if (expiring.length > 0) {
    banner.classList.add('show');
    const first = expiring[0];
    const s = getStatus(first.expiryTs);
    if (s.cls === 'exp') document.getElementById('notif-text').textContent = `${first.name} está com garantia vencida. Verifique!`;
    else document.getElementById('notif-text').textContent = `${first.name} vence em ${s.days} dias. Fique atento!`;
  } else {
    banner.classList.remove('show');
  }

  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  if (sorted.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🛡️</div>
      <h2>Nenhum produto ainda</h2>
      <p>Toque no botão <strong>+</strong> para cadastrar seu primeiro produto com garantia.</p>
    </div>`;
    return;
  }

  // Show expiring/expired first, then ok
  const urgent = sorted.filter(p => getStatus(p.expiryTs).cls !== 'ok');
  const fine = sorted.filter(p => getStatus(p.expiryTs).cls === 'ok');

  if (urgent.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Atenção necessária';
    container.appendChild(lbl);
    urgent.forEach(p => container.appendChild(buildCard(p)));
  }
  if (fine.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Em garantia';
    container.appendChild(lbl);
    fine.slice(0, 5).forEach(p => container.appendChild(buildCard(p)));
    if (fine.length > 5) {
      const more = document.createElement('div');
      more.style = 'text-align:center;padding:8px 0 16px;font-size:13px;color:var(--green-400);cursor:pointer;font-weight:500';
      more.textContent = `Ver mais ${fine.length - 5} produtos →`;
      more.onclick = () => switchTab('list');
      container.appendChild(more);
    }
  }
}

function buildCard(p) {
  const s = getStatus(p.expiryTs);
  const pct = progressPct(p.purchaseTs, p.expiryTs);
  const card = document.createElement('div');
  card.className = 'product-card';
  card.onclick = () => openDetail(p);

  const iconBg = s.cls === 'ok' ? 'background:var(--green-50)' : s.cls === 'warn' ? 'background:var(--amber-50)' : 'background:var(--red-50)';
  const iconContent = p.photo ? `<img src="${p.photo}" alt="" style="width:100%;height:100%;object-fit:cover">` : escapeHtml(p.emoji);

  card.innerHTML = `
    <div class="card-top">
      <div class="product-icon" style="${iconBg}">${iconContent}</div>
      <div class="card-info">
        <h3>${escapeHtml(p.name)}</h3>
        <div class="brand">${escapeHtml(p.brand || 'Sem marca')} ${p.store ? '· ' + escapeHtml(p.store) : ''}</div>
      </div>
      <span class="status-pill status-${s.cls}">${s.label}</span>
    </div>
    <div class="progress-area">
      <div class="progress-labels">
        <span>${formatDate(p.purchaseTs)}</span>
        <span>${formatDate(p.expiryTs)}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill fill-${s.cls}" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="countdown-chip">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ${s.days >= 0 ? 'Faltam ' + formatCountdown(s.days) : 'Vencida ' + formatCountdown(s.days)}
    </div>
  `;
  return card;
}

async function saveProduct() {
  const name = document.getElementById('input-name').value.trim();
  const brand = document.getElementById('input-brand').value.trim();
  const store = document.getElementById('input-store').value.trim();
  const nf = document.getElementById('input-nf').value.trim();
  const months = parseInt(document.getElementById('input-months').value);
  const purchaseStr = document.getElementById('input-purchase').value;

  if (!name) { document.getElementById('input-name').focus(); return; }
  if (!months || months < 1) { document.getElementById('input-months').focus(); return; }
  if (!purchaseStr) { document.getElementById('input-purchase').focus(); return; }

  const purchaseTs = dateToTs(purchaseStr);
  const expiryTs = calcExpiry(purchaseTs, months);
  const id = editingId || generateId();

  const saveBtn = document.querySelector('#sheet-add .btn-save');
  const saveBtnLabel = saveBtn.textContent;
  saveBtn.disabled = true;
  saveBtn.textContent = 'Salvando...';

  try {
    let photoPath = editingPhotoPath;
    if (currentPhotoAction === 'removed') {
      await deletePhotoFile(editingPhotoPath);
      photoPath = null;
    } else if (currentPhotoAction === 'new') {
      await deletePhotoFile(editingPhotoPath);
      photoPath = await uploadPhoto(currentPhotoBlob, id);
    }

    const row = {
      id,
      device_id: userId,
      name, brand: brand || null, store: store || null, nf: nf || null,
      emoji: selectedEmoji,
      photo_url: photoPath,
      purchase_date: purchaseStr,
      warranty_months: months,
      expiry_date: tsToDateInputValue(expiryTs)
    };

    const { error } = await supabase.from('warranties').upsert(row);
    if (error) { alert('Não foi possível salvar: ' + error.message); return; }

    closeAddSheet();
    await refreshProducts();
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = saveBtnLabel;
  }
}

function generateId() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
}

// Converte uma linha da tabela warranties para o formato usado pela UI
function rowToProduct(row) {
  return {
    id: row.id,
    emoji: row.emoji || '📱',
    name: row.name,
    brand: row.brand || '',
    store: row.store || '',
    nf: row.nf || '',
    months: row.warranty_months,
    purchaseTs: dateToTs(row.purchase_date),
    expiryTs: dateToTs(row.expiry_date),
    photoPath: row.photo_url || null,
    photo: null
  };
}

// Busca URLs assinadas (bucket privado) para os produtos que tem foto
async function attachSignedPhotoUrls(list) {
  const paths = list.filter(p => p.photoPath).map(p => p.photoPath);
  if (paths.length === 0) return list;
  const { data, error } = await supabase.storage.from(PHOTO_BUCKET).createSignedUrls(paths, 60 * 60 * 24);
  if (error || !data) return list;
  const map = {};
  data.forEach(d => { if (d.signedUrl) map[d.path] = d.signedUrl; });
  return list.map(p => p.photoPath ? { ...p, photo: map[p.photoPath] || null } : p);
}

async function loadProducts() {
  const { data, error } = await supabase
    .from('warranties')
    .select('*')
    .order('expiry_date', { ascending: true });
  if (error) { console.error('Erro ao carregar produtos:', error); products = []; return; }
  products = await attachSignedPhotoUrls(data.map(rowToProduct));
}

async function refreshProducts() {
  await loadProducts();
  renderDash();
  if (document.getElementById('screen-list').classList.contains('active')) renderList();
}

// Backup export/import (o JSON e autocontido: fotos vao embutidas em base64)
async function exportBackup() {
  const items = [];
  for (const p of products) {
    let photo = null;
    if (p.photo) {
      try { photo = await blobToDataUrl(await (await fetch(p.photo)).blob()); } catch { photo = null; }
    }
    items.push({ id: p.id, emoji: p.emoji, name: p.name, brand: p.brand, store: p.store, nf: p.nf, months: p.months, purchaseTs: p.purchaseTs, expiryTs: p.expiryTs, photo });
  }
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `garantiapp-backup-${tsToDateInputValue(nowTs())}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importBackup(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async () => {
    let imported;
    try {
      imported = JSON.parse(reader.result);
    } catch {
      alert('Arquivo inválido: não é um JSON válido.');
      return;
    }
    const valid = Array.isArray(imported) && imported.every(p =>
      p && typeof p.name === 'string' && typeof p.purchaseTs === 'number' && typeof p.expiryTs === 'number'
    );
    if (!valid) {
      alert('Arquivo inválido: formato de backup inesperado.');
      return;
    }
    if (!confirm(`Importar ${imported.length} produto(s)? Isso substitui todos os dados atuais na nuvem.`)) return;

    for (const p of products) await deletePhotoFile(p.photoPath);
    await supabase.from('warranties').delete().eq('device_id', userId);

    for (const p of imported) {
      const id = p.id || generateId();
      let photoPath = null;
      if (p.photo) {
        try { photoPath = await uploadPhoto(await dataUrlToBlob(p.photo), id); } catch { photoPath = null; }
      }
      await supabase.from('warranties').upsert({
        id, device_id: userId, name: p.name, brand: p.brand || null, store: p.store || null,
        nf: p.nf || null, emoji: p.emoji || '📱', photo_url: photoPath,
        purchase_date: tsToDateInputValue(p.purchaseTs), warranty_months: p.months,
        expiry_date: tsToDateInputValue(p.expiryTs)
      });
    }

    await refreshProducts();
  };
  reader.readAsText(file);
}

async function deleteProduct() {
  if (!editingId) return;
  if (!confirm('Excluir este produto?')) return;
  const p = products.find(x => x.id === editingId);
  const { error } = await supabase.from('warranties').delete().eq('id', editingId);
  if (error) { alert('Não foi possível excluir: ' + error.message); return; }
  if (p) await deletePhotoFile(p.photoPath);
  closeAddSheet();
  await refreshProducts();
}

// Autenticacao anonima: cada instalacao do app vira um usuario proprio no Supabase,
// sem tela de login. Precisa de "Allow anonymous sign-ins" habilitado no projeto.
async function initAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) { userId = session.user.id; return; }

  const { data, error } = await supabase.auth.signInAnonymously();
  if (error) {
    alert('Não foi possível conectar à nuvem: habilite "Allow anonymous sign-ins" em Authentication → Sign In / Providers no painel do Supabase.');
    throw error;
  }
  userId = data.user.id;
}

// Migra, uma unica vez, dados que ficaram no localStorage de uma versao anterior do app
async function migrateLocalDataIfAny() {
  const raw = localStorage.getItem('garantia_products');
  if (!raw) return;

  let local;
  try { local = JSON.parse(raw); } catch { localStorage.removeItem('garantia_products'); return; }
  if (!Array.isArray(local) || local.length === 0) { localStorage.removeItem('garantia_products'); return; }

  for (const p of local) {
    const id = p.id || generateId();
    let photoPath = null;
    if (p.photo) {
      try { photoPath = await uploadPhoto(await dataUrlToBlob(p.photo), id); } catch { photoPath = null; }
    }
    await supabase.from('warranties').upsert({
      id, device_id: userId, name: p.name, brand: p.brand || null, store: p.store || null,
      nf: p.nf || null, emoji: p.emoji || '📱', photo_url: photoPath,
      purchase_date: tsToDateInputValue(p.purchaseTs), warranty_months: p.months,
      expiry_date: tsToDateInputValue(p.expiryTs)
    });
  }
  localStorage.removeItem('garantia_products');
}

async function init() {
  await initAuth();
  await migrateLocalDataIfAny();
  await refreshProducts();
  setInterval(renderDash, 60000);
}

init().catch(err => console.error('Erro ao iniciar o app:', err));
</script>
